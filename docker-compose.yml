x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xtomm
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the deployment environment}"
      POSTGRES_DB: portfolio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xtomm -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Prisma DB Init (one-time) ───────────────────────
  # db-init:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: prisma
  #   environment:
  #     DATABASE_URL: "postgresql://xtomm:xtomm_secret@db:5432/portfolio?schema=public"
  #   command: ["npx", "prisma", "db", "push"]
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: "no"
  # ─── Database Migrations ─────────────────────────────
  migrate:
    image: "${MIGRATE_IMAGE:-portfolio-landing-migrate:local}"
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: "postgresql://xtomm:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the deployment environment}@db:5432/portfolio?schema=public"
    command: ["./node_modules/.bin/prisma", "migrate", "deploy"]
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    logging: *default-logging

  # ─── Next.js App ─────────────────────────────────────
  app:
    image: "${APP_IMAGE:-portfolio-landing-app:local}"
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://phao.dev}"
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}"
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://xtomm:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the deployment environment}@db:5432/portfolio?schema=public"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in the deployment environment}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://phao.dev}"
      GOOGLE_SITE_VERIFICATION: "${GOOGLE_SITE_VERIFICATION:-}"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?Set NEXT_PUBLIC_TURNSTILE_SITE_KEY in the deployment environment}"
      TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?Set NEXT_PUBLIC_TURNSTILE_SITE_KEY in the deployment environment}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY:?Set TURNSTILE_SECRET_KEY in the deployment environment}"
      PROJECT_IMAGE_UPLOAD_DIR: "/app/uploads/projects"
      POST_IMAGE_UPLOAD_DIR: "/app/uploads/posts"
    expose:
      - "3000"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /app/.next/cache
    volumes:
      - project_uploads:/app/uploads/projects
      - post_uploads:/app/uploads/posts
      - public_data:/app/legacy-public:ro
    init: true
    stop_grace_period: 20s
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  # ─── Nginx Reverse Proxy ─────────────────────────────
  nginx:
    image: nginx:1.31.1-alpine@sha256:8b1e78743a03dbb2c95171cc58639fef29abc8816598e27fb910ed2e621e589a
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    init: true
    command: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/portfolio/nginx.conf"]
    expose:
      - "80"
    volumes:
      - ./nginx:/etc/nginx/portfolio:ro
    depends_on:
      app:
        condition: service_healthy
    logging: *default-logging

  # ─── Cloudflare Tunnel (edge ingress) ───────────────
  cloudflared:
    image: cloudflare/cloudflared:2026.5.2
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    init: true
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN:?Set CLOUDFLARED_TUNNEL_TOKEN in the deployment environment}"
    depends_on:
      - nginx
    logging: *default-logging

volumes:
  pgdata:
  project_uploads:
  post_uploads:
  # Legacy read-only fallback for media uploaded before uploads moved out of /app/public.
  public_data:
