services:
  # ─── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xtomm
      POSTGRES_PASSWORD: xtomm_secret
      POSTGRES_DB: portfolio
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xtomm -d portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Prisma DB Init (one-time) ───────────────────────
  # db-init:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: prisma
  #   environment:
  #     DATABASE_URL: "postgresql://xtomm:xtomm_secret@db:5432/portfolio?schema=public"
  #   command: ["npx", "prisma", "db", "push"]
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   restart: "no"
  # ─── Next.js App ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://phao.dev}"
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY}"
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://xtomm:xtomm_secret@db:5432/portfolio?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      NEXT_PUBLIC_SITE_URL: "${NEXT_PUBLIC_SITE_URL:-https://phao.dev}"
      GOOGLE_SITE_VERIFICATION: "${GOOGLE_SITE_VERIFICATION:-}"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "${NEXT_PUBLIC_TURNSTILE_SITE_KEY}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY}"
    expose:
      - "3000"
    volumes:
      - public_data:/app/public
    depends_on:
      db:
        condition: service_healthy
      # db-init:
      #   condition: service_completed_successfully

  # ─── Nginx Reverse Proxy ─────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/fallback-404.html:/usr/share/nginx/html/fallback-404.html:ro
    depends_on:
      - app

  # ─── Cloudflare Tunnel (edge ingress) ───────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN}"
    depends_on:
      - nginx

volumes:
  pgdata:
  public_data:
