name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "22"
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://phao.dev' }}
  NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

jobs:
  # ─── Lint & Type Check ──────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run lint

  # ─── Build ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  # ─── Docker Build & Push ────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      image-ref: ${{ steps.image.outputs.ref }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: image
        shell: bash
        run: |
          image_ref="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          latest_ref="${REGISTRY}/${IMAGE_NAME}:latest"
          echo "ref=${image_ref,,}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest_ref,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.latest }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ env.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            DATABASE_URL=${{ env.DATABASE_URL }}
            APP_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, truenas, portfolio-landing]
    needs: docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      APP_IMAGE: ${{ needs.docker.outputs.image-ref }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/mnt/Orion/docker/stacks/production-portfolio' }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify host prerequisites
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH is empty. Set the DEPLOY_PATH repository variable." >&2
            exit 1
          fi

          docker version >/dev/null

          if ! docker compose version >/dev/null 2>&1 && ! docker-compose version >/dev/null 2>&1; then
            echo "Docker Compose v2 or docker-compose must be installed on the self-hosted runner." >&2
            exit 1
          fi

      - name: Sync deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          install -d "$DEPLOY_PATH"
          install -m 644 docker-compose.yml "$DEPLOY_PATH/docker-compose.yml"
          install -m 644 compose.runner.yml "$DEPLOY_PATH/compose.runner.yml"
          install -m 644 .env.example "$DEPLOY_PATH/.env.example"
          rm -rf "$DEPLOY_PATH/nginx"
          cp -R nginx "$DEPLOY_PATH/nginx"

          if [ ! -f "$DEPLOY_PATH/.env" ]; then
            echo "Missing $DEPLOY_PATH/.env. Create it from $DEPLOY_PATH/.env.example before deploying." >&2
            exit 1
          fi

      - name: Log in to GHCR
        shell: bash
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin >/dev/null

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail

          compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          cd "$DEPLOY_PATH"

          case "$APP_IMAGE" in
            ghcr.io/*:"$GITHUB_SHA") ;;
            *)
              echo "Refusing to deploy without the immutable GHCR image for this commit: $APP_IMAGE" >&2
              exit 1
              ;;
          esac

          APP_IMAGE="$APP_IMAGE" compose pull app
          APP_IMAGE="$APP_IMAGE" compose pull migrate

          install -d "$DEPLOY_PATH/backups"
          if APP_IMAGE="$APP_IMAGE" compose ps --status running --services | grep -qx db; then
            APP_IMAGE="$APP_IMAGE" compose exec -T db pg_dump -U xtomm portfolio | gzip > "$DEPLOY_PATH/backups/portfolio-before-${GITHUB_SHA}.sql.gz"
          fi

          if ! APP_IMAGE="$APP_IMAGE" compose up -d --no-build; then
            echo "Docker Compose startup failed; service status and migration logs follow." >&2
            APP_IMAGE="$APP_IMAGE" compose ps -a || true
            APP_IMAGE="$APP_IMAGE" compose logs --tail=200 migrate app || true
            exit 1
          fi

          running_app_container="$(APP_IMAGE="$APP_IMAGE" compose ps -q app)"
          running_app_image="$(docker inspect "$running_app_container" --format '{{.Config.Image}}')"
          if [ "$running_app_image" != "$APP_IMAGE" ]; then
            echo "App container is not running the image that was just built." >&2
            echo "Expected: $APP_IMAGE" >&2
            echo "Actual:   $running_app_image" >&2
            exit 1
          fi

          # nginx reads its config once at startup; the file is a bind mount
          # that was just synced into place, so reload in place instead of
          # restarting the proxy on every app deployment.
          APP_IMAGE="$APP_IMAGE" compose exec -T nginx nginx -t
          APP_IMAGE="$APP_IMAGE" compose exec -T nginx nginx -s reload

          attempt=1
          while [ "$attempt" -le 30 ]; do
            if APP_IMAGE="$APP_IMAGE" compose exec -T app node -e "const expected = process.env.APP_REVISION; fetch('http://127.0.0.1:3000/api/health').then((response) => response.json()).then((body) => process.exit(body.status === 'ok' && body.revision === expected ? 0 : 1)).catch(() => process.exit(1))" && \
               APP_IMAGE="$APP_IMAGE" compose exec -T nginx wget -q -O - http://127.0.0.1/api/health | grep -q "\"revision\":\"$GITHUB_SHA\"" && \
               curl -fsS "$NEXT_PUBLIC_SITE_URL/api/health" | grep -q "\"revision\":\"$GITHUB_SHA\""; then
              APP_IMAGE="$APP_IMAGE" compose ps
              exit 0
            fi

            sleep 2
            attempt=$((attempt + 1))
          done

          APP_IMAGE="$APP_IMAGE" compose logs --tail=200 app nginx
          exit 1

      - name: Summarize deployment
        shell: bash
        run: |
          {
            echo "### Production deployment"
            echo ""
            echo "Runner: \`${RUNNER_NAME}\`"
            echo "Deploy path: \`$DEPLOY_PATH\`"
            echo "Deployed image: \`$APP_IMAGE\`"
          } >> "$GITHUB_STEP_SUMMARY"
