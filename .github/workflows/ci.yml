name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "22"
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  NEXT_PUBLIC_SITE_URL: "https://example.invalid"
  JWT_SECRET: "ci-only-session-secret-0123456789abcdef"
  TURNSTILE_SITE_KEY: "ci-site-key"
  TURNSTILE_SECRET_KEY: "ci-secret-key"

jobs:
  # ─── Lint & Type Check ──────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm audit --audit-level=high

  # ─── Build ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

  # ─── Docker Build & Push ────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      image-ref: ${{ steps.image.outputs.ref }}
      migrate-image-ref: ${{ steps.image.outputs.migrate-ref }}
    permissions:
      contents: read
      packages: write
    env:
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://phao.dev' }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: image
        shell: bash
        run: |
          image_ref="${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}"
          latest_ref="${REGISTRY}/${IMAGE_NAME}:latest"
          migrate_ref="${REGISTRY}/${IMAGE_NAME}-migrate:${GITHUB_SHA}"
          migrate_latest_ref="${REGISTRY}/${IMAGE_NAME}-migrate:latest"
          echo "ref=${image_ref,,}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest_ref,,}" >> "$GITHUB_OUTPUT"
          echo "migrate-ref=${migrate_ref,,}" >> "$GITHUB_OUTPUT"
          echo "migrate-latest=${migrate_latest_ref,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build-app
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
            ${{ steps.image.outputs.latest }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ env.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            DATABASE_URL=${{ env.DATABASE_URL }}
            APP_REVISION=${{ github.sha }}
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner
          sbom: true
          provenance: mode=max

      - name: Build and push migration image
        id: build-migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ${{ steps.image.outputs.migrate-ref }}
            ${{ steps.image.outputs.migrate-latest }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=migrate
          cache-to: type=gha,mode=max,scope=migrate
          sbom: true
          provenance: mode=max

  # ─── Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, truenas, portfolio-landing]
    timeout-minutes: 20
    needs: docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      packages: read
    env:
      APP_IMAGE: ${{ needs.docker.outputs.image-ref }}
      MIGRATE_IMAGE: ${{ needs.docker.outputs.migrate-image-ref }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/mnt/Orion/docker/stacks/production-portfolio' }}
      PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://phao.dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify host prerequisites
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_PATH" ]; then
            echo "DEPLOY_PATH is empty. Set the DEPLOY_PATH repository variable." >&2
            exit 1
          fi
          case "$DEPLOY_PATH" in
            /*) ;;
            *)
              echo "DEPLOY_PATH must be an absolute path." >&2
              exit 1
              ;;
          esac
          if [ "$DEPLOY_PATH" = "/" ]; then
            echo "Refusing to use the filesystem root as DEPLOY_PATH." >&2
            exit 1
          fi

          docker version >/dev/null

          if ! docker compose version >/dev/null 2>&1 && ! docker-compose version >/dev/null 2>&1; then
            echo "Docker Compose v2 or docker-compose must be installed on the self-hosted runner." >&2
            exit 1
          fi

      - name: Sync deployment bundle
        shell: bash
        run: |
          set -euo pipefail

          install -d "$DEPLOY_PATH"
          install -m 644 docker-compose.yml "$DEPLOY_PATH/docker-compose.yml"
          install -m 644 compose.runner.yml "$DEPLOY_PATH/compose.runner.yml"
          install -m 644 .env.example "$DEPLOY_PATH/.env.example"
          install -d "$DEPLOY_PATH/nginx"
          install -m 644 nginx/nginx.conf "$DEPLOY_PATH/nginx/nginx.conf"
          install -m 644 nginx/fallback-404.html "$DEPLOY_PATH/nginx/fallback-404.html"

          if [ ! -f "$DEPLOY_PATH/.env" ]; then
            echo "Missing $DEPLOY_PATH/.env. Create it from $DEPLOY_PATH/.env.example before deploying." >&2
            exit 1
          fi

      - name: Log in to GHCR
        shell: bash
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin >/dev/null

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail

          compose() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            else
              docker-compose "$@"
            fi
          }

          cd "$DEPLOY_PATH"

          case "$APP_IMAGE" in
            ghcr.io/*:"$GITHUB_SHA") ;;
            *)
              echo "Refusing to deploy without the immutable GHCR image for this commit: $APP_IMAGE" >&2
              exit 1
              ;;
          esac
          case "$MIGRATE_IMAGE" in
            ghcr.io/*-migrate:"$GITHUB_SHA") ;;
            *)
              echo "Refusing to deploy without the immutable migration image for this commit: $MIGRATE_IMAGE" >&2
              exit 1
              ;;
          esac

          APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose config --quiet

          postgres_password="$(awk '
            /^[[:space:]]*POSTGRES_PASSWORD[[:space:]]*=/ {
              value = substr($0, index($0, "=") + 1)
            }
            END {
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
              if (value ~ /^".*"$/ || value ~ /^\047.*\047$/) {
                value = substr(value, 2, length(value) - 2)
              }
              print value
            }
          ' .env)"
          postgres_password="${postgres_password%$'\r'}"
          if [ -z "$postgres_password" ]; then
            echo "POSTGRES_PASSWORD is missing from $DEPLOY_PATH/.env." >&2
            exit 1
          fi
          export POSTGRES_PASSWORD="$postgres_password"
          unset postgres_password

          previous_app_container="$(APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose ps -q app 2>/dev/null || true)"
          previous_app_image=""
          if [ -n "$previous_app_container" ]; then
            previous_app_image="$(docker inspect "$previous_app_container" --format '{{.Config.Image}}' 2>/dev/null || true)"
          fi

          install -d -m 700 "$DEPLOY_PATH/backups"
          umask 077
          backup_path="$DEPLOY_PATH/backups/portfolio-before-${GITHUB_SHA}.sql.gz"
          if ! APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose ps --status running --services | grep -qx db; then
            APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose up -d --no-build db
          fi

          attempt=1
          until APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T db pg_isready -U xtomm -d portfolio >/dev/null 2>&1; do
            if [ "$attempt" -ge 30 ]; then
              echo "PostgreSQL did not become ready before deployment." >&2
              APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose ps db || true
              exit 1
            fi

            sleep 2
            attempt=$((attempt + 1))
          done

          if ! APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T -e PGPASSWORD="$POSTGRES_PASSWORD" db psql -U xtomm -d portfolio -v ON_ERROR_STOP=1 -c "select 1" >/dev/null; then
            echo "The running PostgreSQL database rejected POSTGRES_PASSWORD from $DEPLOY_PATH/.env." >&2
            echo "For an existing pgdata volume, changing POSTGRES_PASSWORD in .env does not rotate the xtomm database role." >&2
            echo "Rotate the role or restore .env to the current role password, then rerun deploy." >&2
            echo "See docs/deployment.md#existing-database-password-rotation." >&2
            exit 1
          fi

          APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T -e PGPASSWORD="$POSTGRES_PASSWORD" db pg_dump -U xtomm portfolio | gzip > "$backup_path"
          gzip -t "$backup_path"
          find "$DEPLOY_PATH/backups" -type f -name 'portfolio-before-*.sql.gz' -mtime +30 -delete

          APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose pull app migrate

          if ! APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose up -d --no-build; then
            echo "Docker Compose startup failed; service status and migration logs follow." >&2
            APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose ps -a || true
            APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose logs --tail=200 migrate app || true
            exit 1
          fi

          running_migrate_container="$(APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose ps -a -q migrate)"
          running_migrate_image="$(docker inspect "$running_migrate_container" --format '{{.Config.Image}}')"
          if [ "$running_migrate_image" != "$MIGRATE_IMAGE" ]; then
            echo "Migration container did not use the image built for this commit." >&2
            echo "Expected: $MIGRATE_IMAGE" >&2
            echo "Actual:   $running_migrate_image" >&2
            exit 1
          fi

          running_app_container="$(APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose ps -q app)"
          running_app_image="$(docker inspect "$running_app_container" --format '{{.Config.Image}}')"
          if [ "$running_app_image" != "$APP_IMAGE" ]; then
            echo "App container is not running the image that was just built." >&2
            echo "Expected: $APP_IMAGE" >&2
            echo "Actual:   $running_app_image" >&2
            exit 1
          fi

          # nginx reads its config once at startup; the file is a bind mount
          # that was just synced into place, so reload in place instead of
          # restarting the proxy on every app deployment.
          APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T nginx nginx -t -c /etc/nginx/portfolio/nginx.conf
          APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T nginx nginx -s reload -c /etc/nginx/portfolio/nginx.conf

          attempt=1
          while [ "$attempt" -le 30 ]; do
            if APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T app node -e "const expected = process.env.APP_REVISION; fetch('http://127.0.0.1:3000/api/health').then((response) => response.json()).then((body) => process.exit(body.status === 'ok' && body.revision === expected ? 0 : 1)).catch(() => process.exit(1))" && \
               APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T nginx wget -q -O - http://127.0.0.1/api/health | grep -q "\"revision\":\"$GITHUB_SHA\"" && \
               curl -fsS "$PUBLIC_SITE_URL/api/health" | grep -q "\"revision\":\"$GITHUB_SHA\""; then
              APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose ps
              exit 0
            fi

            sleep 2
            attempt=$((attempt + 1))
          done

          APP_IMAGE="$APP_IMAGE" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose logs --tail=200 app nginx
          if [ -n "$previous_app_image" ] && [ "$previous_app_image" != "$APP_IMAGE" ]; then
            echo "Health verification failed; restoring previous app image: $previous_app_image" >&2
            APP_IMAGE="$previous_app_image" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose up -d --no-deps app
            APP_IMAGE="$previous_app_image" MIGRATE_IMAGE="$MIGRATE_IMAGE" compose exec -T nginx nginx -s reload -c /etc/nginx/portfolio/nginx.conf || true
          fi
          exit 1

      - name: Summarize deployment
        shell: bash
        run: |
          {
            echo "### Production deployment"
            echo ""
            echo "Runner: \`${RUNNER_NAME}\`"
            echo "Deploy path: \`$DEPLOY_PATH\`"
            echo "Deployed image: \`$APP_IMAGE\`"
            echo "Migration image: \`$MIGRATE_IMAGE\`"
          } >> "$GITHUB_STEP_SUMMARY"
