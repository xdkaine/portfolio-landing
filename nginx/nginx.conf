worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # ─── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Request Limits ────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 15s;

    # ─── Rate limiting ─────────────────────────────────────
    map $http_cf_connecting_ip $trusted_client_ip {
        default $http_cf_connecting_ip;
        "" $remote_addr;
    }

    limit_req_zone $trusted_client_ip zone=api:10m rate=10r/s;
    limit_req_zone $trusted_client_ip zone=auth:10m rate=3r/m;
    limit_req_zone $trusted_client_ip zone=contact:10m rate=2r/m;
    limit_req_status 429;

    # ─── Docker DNS ────────────────────────────────────────
    # Docker service IPs change when containers are recreated. Resolve `app`
    # through Docker's embedded DNS instead of pinning the IP at nginx start.
    resolver 127.0.0.11 valid=1s ipv6=off;

    # ─── HTTP Server (Cloudflare Tunnel points here) ───────
    server {
        listen 80;
        server_name _;
        set $nextjs_upstream http://app:3000;

        # Nginx 1.29.3+ can merge parent headers into locations that define
        # cache headers, keeping this upgrade-safe as one mounted config file.
        add_header_inherit merge;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://challenges.cloudflare.com https://cloudflareinsights.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

        # Keep one authoritative edge policy instead of returning duplicate,
        # potentially conflicting application and proxy security headers.
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Resource-Policy;

        # This app does not expose Server Actions; reject probe requests
        # before they reach the Next.js App Router decoder.
        if ($http_next_action != "") {
            return 404;
        }

        location = /health {
            return 200 'ok';
            add_header Cache-Control "no-store" always;
        }

        # Static fallback page served when Next.js is unavailable.
        location = /fallback-404.html {
            root /etc/nginx/portfolio;
            internal;
            add_header Cache-Control "no-store" always;
        }

        location @next_static_miss {
            internal;
            add_header Cache-Control "no-store" always;
            return 404 'Not Found';
        }

        # ─── Auth API (strict rate limit) ──────────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Permissions-Policy;
            proxy_hide_header Cross-Origin-Opener-Policy;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ─── Contact API (strict rate limit) ───────────────
        location /api/contact {
            limit_req zone=contact burst=3 nodelay;
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Permissions-Policy;
            proxy_hide_header Cross-Origin-Opener-Policy;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ─── Upload API ───────────────────────────────────
        location /api/uploads/ {
            # Support multi-image uploads (up to 5 x 10 MB each) without
            # allowing oversized request bodies on every application route.
            client_max_body_size 55m;
            limit_req zone=api burst=10 nodelay;
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Permissions-Policy;
            proxy_hide_header Cross-Origin-Opener-Policy;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ─── General API ──────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Permissions-Policy;
            proxy_hide_header Cross-Origin-Opener-Policy;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # ─── Static assets (long cache) ───────────────────
        location /_next/static/ {
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_intercept_errors on;
            error_page 404 = @next_static_miss;
            proxy_cache_valid 200 365d;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Permissions-Policy;
            proxy_hide_header Cross-Origin-Opener-Policy;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ─── Optimized images and uploads keep upstream cache headers ─────
        location /_next/image {
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /uploads/ {
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ─── Everything else ──────────────────────────────
        location / {
            proxy_pass $nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $trusted_client_ip;
            proxy_set_header X-Forwarded-For $trusted_client_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_hide_header Content-Security-Policy;
            proxy_hide_header Strict-Transport-Security;
            proxy_hide_header X-Frame-Options;
            proxy_hide_header X-Content-Type-Options;
            proxy_hide_header Referrer-Policy;
            proxy_hide_header Permissions-Policy;
            proxy_hide_header Cross-Origin-Opener-Policy;
            proxy_hide_header Cross-Origin-Resource-Policy;
            proxy_hide_header Cache-Control;
            proxy_hide_header Expires;
            add_header Cache-Control "no-store, no-cache, max-age=0, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            proxy_intercept_errors on;
            error_page 500 502 503 504 =503 /fallback-404.html;
        }
    }
}
